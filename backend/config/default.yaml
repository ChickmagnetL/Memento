# Default configuration for Memento
# Do not edit this file. Create config.yaml or config.local.yaml for overrides.

api_host: "0.0.0.0"
api_port: 8000
api_reload: true

cors_origins:
  - "http://localhost:3000"
  - "http://localhost:3123"

log_level: "INFO"

storage:
  data_dir: "data"
  keep_videos: false

models:
  asr:
    endpoint: "http://localhost:8001/v1"
    model: "iic/SenseVoiceSmall"
    protocol: "transcriptions"
  embedding:
    endpoint: "http://localhost:11434/v1"
    model: "qwen3-embedding:0.6b"
  chat:
    api_key: ""
    model: "deepseek-chat"

video_processing:
  auto_clean: true
  preserve_timestamp: true
  bilibili_cookie: ""
  bilibili_refresh_token: ""
  bilibili_cookie_expires_at: 0
  ocr_region: [0.74, 0.94, 0.08, 0.92]

rag:
  chunk_size: 800
  overlap: 80
  top_k: 5
  hybrid_weights:
    bm25: 0.3
    vector: 0.7
