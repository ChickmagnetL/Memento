# Example configuration file for Memento
# Copy this to config.yaml and edit as needed

storage:
  data_dir: "~/memento_data"
  keep_videos: false

models:
  asr:
    provider: "local"
    endpoint: "http://localhost:8001"
    model: "iic/SenseVoiceSmall"
  chat:
    provider: "cloud"  # or "ollama" for local
    # OpenAI-compatible base URL, e.g. https://api.deepseek.com/v1
    endpoint: "https://api.deepseek.com/v1"
    api_key: "sk-your-api-key-here"
    model: "deepseek-chat"
    # Local alternative:
    # chat:
    #   endpoint: "http://localhost:11434/v1"
    #   api_key: "ollama"
    #   model: "qwen3"
  embedding:
    provider: "cloud"
    # OpenAI-compatible base URL, e.g. https://api.siliconflow.cn/v1
    endpoint: "https://api.example.com/v1"
    api_key: "sk-your-api-key-here"
    model: "your-embedding-model"
    # Local alternative:
    # embedding:
    #   provider: "ollama"
    #   endpoint: "http://localhost:11434"
    #   model: "qwen3-embedding:0.6b"   # 1024-dim -> set rag.vector_size: 1024

video_processing:
  # Optional Bilibili cookie for AI subtitles. Prefer the environment variable
  # VIDEO_PROCESSING__BILIBILI_COOKIE for local testing because cookies are sensitive.
  # Example value: "SESSDATA=your-cookie; bili_jct=..."
  # Do not commit real cookie values.
  bilibili_cookie: ""
  # Optional Douyin login cookie for higher API rate limits.
  # Anonymous ttwid is auto-generated for single public videos.
  # Only needed for batch import (v0.3+). Prefer env var
  # VIDEO_PROCESSING__DOUYIN_COOKIE; do not commit real values.
  douyin_cookie: ""
  # Douyin fetcher thin service (f2 in isolated venv)
  douyin_fetcher_endpoint: "http://localhost:8002"

rag:
  # vector_size MUST match the embedding model's output dimension.
  vector_size: 768
