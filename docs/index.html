<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memento 技术 Wiki</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="custom.css">
</head>
<body>
  <!-- Top Nav Bar -->
  <header class="wiki-nav">
    <div class="wiki-nav-inner">
      <a class="wiki-nav-title" href="#/">Memento 技术 Wiki</a>
      <div class="wiki-nav-search" id="wiki-search" aria-label="文档搜索" role="search"></div>
      <button class="wiki-nav-theme" id="theme-toggle" title="切换主题" aria-label="切换浅色/暗色主题">☾</button>
    </div>
  </header>

  <div class="wiki-layout">
    <div id="app">加载中…</div>
  </div>

  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      coverpage: false,
      subMaxLevel: 0,
      auto2top: true,
      search: {
        placeholder: '搜索文档…',
        noData: '没有找到相关内容',
        depth: 3,
      },
      relativePath: true,
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script>
  (function() {
    var target = document.getElementById('wiki-search');
    if (!target) return;

    function mountSearch() {
      var search = document.querySelector('.sidebar .search');
      if (!search) return false;
      var input = search.querySelector('input');
      if (input) input.setAttribute('aria-label', '文档搜索');
      target.appendChild(search);
      return true;
    }

    if (!mountSearch()) {
      var observer = new MutationObserver(function() {
        if (mountSearch()) observer.disconnect();
      });
      observer.observe(document.body, { childList: true, subtree: true });
      window.addEventListener('load', function() {
        mountSearch();
        observer.disconnect();
      }, { once: true });
    }
  })();
  </script>

  <script>
  (function() {
    var html = document.documentElement;
    var btn = document.getElementById('theme-toggle');

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      btn.textContent = theme === 'dark' ? '☀' : '☾';
      try { localStorage.setItem('memento-theme', theme); } catch(e) {}
    }

    var saved = null;
    try { saved = localStorage.getItem('memento-theme'); } catch(e) {}
    setTheme(saved || 'light');

    btn.addEventListener('click', function() {
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(next);
    });
  })();
  </script>
</body>
</html>
