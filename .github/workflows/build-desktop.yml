name: Build Desktop Installers

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'desktop/**'
      - 'services/asr/**'
      - 'services/embedding/**'
      - 'services/node/**'
      - 'services/douyin_fetcher/**'
      - 'scripts/build-backend.sh'
      - 'scripts/build-douyin-fetcher.sh'
      - 'scripts/stage-desktop-resources.mjs'
      - 'scripts/verify-desktop-resources.mjs'
      - '.github/workflows/build-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'desktop/**'
      - 'services/asr/**'
      - 'services/embedding/**'
      - 'services/node/**'
      - 'services/douyin_fetcher/**'
      - 'scripts/build-backend.sh'
      - 'scripts/build-douyin-fetcher.sh'
      - 'scripts/stage-desktop-resources.mjs'
      - 'scripts/verify-desktop-resources.mjs'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup backend venv
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements-dev.txt
          pip install pyinstaller

      - name: Setup Douyin fetcher venv
        run: |
          cd services/douyin_fetcher
          python -m venv .packaging-venv
          source .packaging-venv/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Test backend
        run: |
          cd backend
          source venv/bin/activate
          pytest

      - name: Check frontend
        run: |
          cd frontend
          npm run lint

      - name: Test desktop shell
        run: cd desktop && npm test

      - name: Restore backend build cache
        id: backend-cache
        uses: actions/cache@v4
        with:
          path: backend/dist/memento-backend
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/**', 'scripts/fix-pyi-symlinks.sh', '.github/workflows/build-desktop.yml') }}

      - name: Build backend (PyInstaller)
        if: steps.backend-cache.outputs.cache-hit != 'true'
        run: |
          cd backend
          source venv/bin/activate
          pyinstaller --noconfirm --onedir --name memento-backend \
            --paths . \
            --add-data "storage/schema.sql:storage" \
            --add-data "config/default.yaml:config" \
            --collect-data certifi \
            --collect-data jieba \
            --collect-submodules qdrant_client \
            --collect-submodules pydantic_ai \
            --collect-submodules yt_dlp \
            --hidden-import aiosqlite \
            --copy-metadata genai-prices \
            --copy-metadata pydantic-ai-slim \
            --copy-metadata openai \
            --copy-metadata pydantic \
            --copy-metadata pydantic-settings \
            --copy-metadata fastapi \
            --copy-metadata uvicorn \
            --copy-metadata starlette \
            desktop_entry.py
          bash ../scripts/fix-pyi-symlinks.sh dist/memento-backend

      - name: Restore Douyin fetcher build cache
        id: douyin-fetcher-cache
        uses: actions/cache@v4
        with:
          path: services/douyin_fetcher/dist/memento-douyin-fetcher
          key: ${{ runner.os }}-douyin-fetcher-${{ hashFiles('services/douyin_fetcher/**', 'scripts/fix-pyi-symlinks.sh', '.github/workflows/build-desktop.yml') }}

      - name: Build Douyin fetcher (PyInstaller)
        if: steps.douyin-fetcher-cache.outputs.cache-hit != 'true'
        run: |
          cd services/douyin_fetcher
          source .packaging-venv/bin/activate
          pyinstaller --noconfirm --onedir --name memento-douyin-fetcher \
            --paths . \
            --collect-all f2 \
            desktop_entry.py
          bash ../../scripts/fix-pyi-symlinks.sh dist/memento-douyin-fetcher

      - name: Restore frontend build cache
        id: frontend-cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/standalone
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/**', '.github/workflows/build-desktop.yml') }}

      - name: Build frontend (Next.js standalone)
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npm run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Stage resources
        run: node scripts/stage-desktop-resources.mjs

      - name: Verify runtime resources
        run: node scripts/verify-desktop-resources.mjs

      - name: Smoke test packaged sidecars
        run: |
          set -euo pipefail
          STORAGE__DATA_DIR="$RUNNER_TEMP/memento-smoke-data" \
            MEMENTO_PROJECT_ROOT="$RUNNER_TEMP/memento-smoke-runtime" \
            desktop/resources/backend/memento-backend &
          BACKEND_PID=$!
          desktop/resources/douyin-fetcher/memento-douyin-fetcher &
          DOUYIN_PID=$!
          trap 'kill "$BACKEND_PID" "$DOUYIN_PID" 2>/dev/null || true' EXIT
          for i in {1..120}; do
            curl -fsS http://127.0.0.1:8000/api/health >/dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/api/health
          for i in {1..120}; do
            curl -fsS http://127.0.0.1:8002/health >/dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8002/health

      - name: Build macOS installer (electron-builder)
        run: cd desktop && npx electron-builder --mac

      - name: Verify packaged login window
        run: cd desktop && npx @electron/asar list dist/mac*/Memento.app/Contents/Resources/app.asar | grep -qx '/login-shell.html'

      - uses: actions/upload-artifact@v4
        with:
          name: Memento-macOS
          path: desktop/dist/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup backend venv
        run: |
          cd backend
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          pip install -r requirements-dev.txt
          pip install pyinstaller

      - name: Setup Douyin fetcher venv
        run: |
          cd services/douyin_fetcher
          python -m venv .packaging-venv
          .\.packaging-venv\Scripts\Activate.ps1
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Test backend
        run: |
          cd backend
          .\venv\Scripts\Activate.ps1
          pytest

      - name: Check frontend
        run: |
          cd frontend
          npm run lint

      - name: Test desktop shell
        run: cd desktop && npm test

      - name: Restore backend build cache
        id: backend-cache
        uses: actions/cache@v4
        with:
          path: backend/dist/memento-backend
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/**', 'scripts/fix-pyi-symlinks.sh', '.github/workflows/build-desktop.yml') }}

      - name: Build backend (PyInstaller)
        if: steps.backend-cache.outputs.cache-hit != 'true'
        run: |
          cd backend
          .\venv\Scripts\Activate.ps1
          pyinstaller --noconfirm --onedir --name memento-backend `
            --paths . `
            --add-data "storage/schema.sql;storage" `
            --add-data "config/default.yaml;config" `
            --collect-data certifi `
            --collect-data jieba `
            --collect-submodules qdrant_client `
            --collect-submodules pydantic_ai `
            --collect-submodules yt_dlp `
            --hidden-import aiosqlite `
            --copy-metadata genai-prices `
            --copy-metadata pydantic-ai-slim `
            --copy-metadata openai `
            --copy-metadata pydantic `
            --copy-metadata pydantic-settings `
            --copy-metadata fastapi `
            --copy-metadata uvicorn `
            --copy-metadata starlette `
            desktop_entry.py

      - name: Restore Douyin fetcher build cache
        id: douyin-fetcher-cache
        uses: actions/cache@v4
        with:
          path: services/douyin_fetcher/dist/memento-douyin-fetcher
          key: ${{ runner.os }}-douyin-fetcher-${{ hashFiles('services/douyin_fetcher/**', 'scripts/fix-pyi-symlinks.sh', '.github/workflows/build-desktop.yml') }}

      - name: Build Douyin fetcher (PyInstaller)
        if: steps.douyin-fetcher-cache.outputs.cache-hit != 'true'
        run: |
          cd services/douyin_fetcher
          .\.packaging-venv\Scripts\Activate.ps1
          pyinstaller --noconfirm --onedir --name memento-douyin-fetcher `
            --paths . `
            --collect-all f2 `
            desktop_entry.py

      - name: Restore frontend build cache
        id: frontend-cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/standalone
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/**', '.github/workflows/build-desktop.yml') }}

      - name: Build frontend (Next.js standalone)
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npm run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Stage resources
        run: node scripts/stage-desktop-resources.mjs

      - name: Verify runtime resources
        run: node scripts/verify-desktop-resources.mjs

      - name: Smoke test packaged sidecars
        shell: pwsh
        run: |
          $env:STORAGE__DATA_DIR = Join-Path $env:RUNNER_TEMP 'memento-smoke-data'
          $env:MEMENTO_PROJECT_ROOT = Join-Path $env:RUNNER_TEMP 'memento-smoke-runtime'
          $backend = Start-Process -FilePath 'desktop/resources/backend/memento-backend.exe' -PassThru -NoNewWindow
          $douyin = Start-Process -FilePath 'desktop/resources/douyin-fetcher/memento-douyin-fetcher.exe' -PassThru -NoNewWindow
          try {
            $backendReady = $false
            $douyinReady = $false
            foreach ($attempt in 1..120) {
              try {
                Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8000/api/health | Out-Null
                $backendReady = $true
                break
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            foreach ($attempt in 1..120) {
              try {
                Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8002/health | Out-Null
                $douyinReady = $true
                break
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $backendReady) { throw 'Packaged backend failed its health check.' }
            if (-not $douyinReady) { throw 'Packaged Douyin fetcher failed its health check.' }
          } finally {
            Stop-Process -Id $backend.Id,$douyin.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Build Windows installer (electron-builder)
        run: cd desktop && npx electron-builder --win

      - name: Smoke test Windows uninstall cleanup
        shell: pwsh
        run: |
          ./desktop/tests/windows-uninstall-cleanup.ps1 `
            -InstallerPath desktop/dist/Memento-Windows.exe `
            -ProductName Memento

      - name: Smoke test packaged Windows app
        shell: pwsh
        run: |
          $app = Start-Process -FilePath 'desktop/dist/win-unpacked/Memento.exe' -PassThru
          try {
            $windowReady = $false
            $backendReady = $false
            $frontendReady = $false
            foreach ($attempt in 1..120) {
              if ($app.HasExited) { throw "Packaged app exited with code $($app.ExitCode)." }
              $app.Refresh()
              $windowReady = $windowReady -or $app.MainWindowHandle -ne 0
              try {
                Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8000/api/health | Out-Null
                $backendReady = $true
              } catch {}
              try {
                Invoke-WebRequest -UseBasicParsing http://127.0.0.1:3123 | Out-Null
                $frontendReady = $true
              } catch {}
              if ($windowReady -and $backendReady -and $frontendReady) { break }
              Start-Sleep -Seconds 1
            }
            if (-not $windowReady) { throw 'Packaged app did not create a window.' }
            if (-not $backendReady) { throw 'Packaged app backend did not become healthy.' }
            if (-not $frontendReady) { throw 'Packaged app frontend did not become healthy.' }
          } finally {
            taskkill.exe /PID $app.Id /T /F 2>$null | Out-Null
          }

      - name: Verify packaged login window
        shell: pwsh
        run: |
          $files = npx @electron/asar list desktop/dist/win-unpacked/resources/app.asar | ForEach-Object { $_ -replace '\\', '/' }
          if ($files -notcontains '/login-shell.html') {
            throw 'The packaged login window is missing.'
          }

      - uses: actions/upload-artifact@v4
        with:
          name: Memento-Windows
          path: desktop/dist/*.exe
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --generate-notes --title "$GITHUB_REF_NAME"
